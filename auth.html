<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Access Portal - NishaTech</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center font-sans p-4">
    <div class="w-full max-w-md bg-slate-900/60 border border-slate-800/80 rounded-2xl p-6 backdrop-blur-md shadow-2xl">
        <div class="text-center mb-6">
            <div class="bg-indigo-600 w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-3 shadow-md">
                <i class="fas fa-lock text-xl text-white"></i>
            </div>
            <h2 class="text-xl font-bold text-white">Security Command Gateway</h2>
            <p class="text-xs text-slate-400 mt-1">Authenticate to access the multi-agent network</p>
        </div>
        
        <form action="/auth" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Corporate Email</label>
                <input type="email" name="email" required class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm focus:outline-none focus:border-indigo-500 transition text-white" placeholder="admin@nishatech.com">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Security Token / Password</label>
                <input type="password" name="password" required class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm focus:outline-none focus:border-indigo-500 transition text-white" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3 rounded-lg transition shadow-lg flex items-center justify-center space-x-2 mt-2 cursor-pointer">
                <span>Verify & Establish Session</span>
                <i class="fas fa-shield-halved text-xs"></i>
            </button>
        </form>
    </div>
</body>
</html>
